# Book settings
title: "Manual de prácticas para química computacional. Del orbital al espacio químico"
author: "Azriel Belgrado"
copyright: "2026"
# logo: assets/images/logo.png  # comentado porque no existe el archivo


# Execution settings
execute:
  execute_notebooks: auto
  timeout: 600
  allow_errors: false

# Repository info
repository:
  url: https://github.com/Eduardo-Gabriel-Guzman-Lopez/computational-chemistry-book
  path_to_book: "."
  branch: main

# HTML settings
html:
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true
  home_page_in_navbar: true
  # add custom CSS and logo/cover graphic
  # No logo image provided yet; using cover.png if desired
  #favicon: assets/images/logo.png
  #logo: assets/images/logo.png
  extra_css:
    - _static/custom.css


# Launch buttons for interactivity
launch_buttons:
  notebook_interface: "jupyterlab"
  binderhub_url: "https://mybinder.org"
  colab_url: "https://colab.research.google.com"
  thebe: true

# Sphinx extensions
sphinx:
  extra_extensions:
    - sphinx_design
    - myst_nb
    - sphinxcontrib.mermaid
    - sphinxcontrib.bibtex
  config:
    language: es
    mermaid_version: "10.6.1"
    # mermaid_init_js was removed because the current sphinxcontrib-mermaid
    # extension no longer recognizes it; keeping it causes a -W build error
    bibtex_bibfiles:
      - references.bib
    exclude_patterns:
      - README.md  # 跳过 Unused README to avoid warning treated-as-error

# MyST parser extensions
parse:
  myst_enable_extensions:
    - amsmath
    - colon_fence
    - deflist
    - dollarmath
    - html_admonition
    - substitution
    - tasklist
