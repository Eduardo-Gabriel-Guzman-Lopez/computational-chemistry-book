name: build-book

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-book:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "jupyter-book<2.0" ghp-import sphinx-design
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Show project files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort | head -200

      - name: Build book
        run: |
          jupyter-book build .
          echo "Build completed with exit code: $?"

      - name: Inspect build output
        run: |
          echo "Checking _build contents..."
          ls -la
          ls -la _build || echo "_build directory not found"
          ls -la _build/html || echo "_build/html directory not found"
          # Check if index.html exists
          if [ -f "_build/html/index.html" ]; then
            echo "✓ index.html found"
          else
            echo "✗ index.html not found"
            exit 1
          fi

      - name: Deploy to gh-pages
        run: |
          echo "Starting deployment..."
          if [ -d "_build/html" ]; then
            echo "✓ _build/html directory exists"
            ls -la _build/html | head -10
            echo "Deploying with ghp-import..."
            ghp-import -n -p -f _build/html
            echo "✓ Deployment completed successfully"
          else
            echo "✗ _build/html directory not found!"
            echo "Build may have failed. Checking for errors..."
            ls -la _build 2>/dev/null || echo "No _build directory at all"
            exit 1
          fi
