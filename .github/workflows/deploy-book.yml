name: build-book

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-book:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.13"
          miniforge-variant: Miniforge3
          use-mamba: true

      - name: Install dependencies
        run: |
          pip install jupyter-book sphinx-design sphinxcontrib-bibtex sphinxcontrib-mermaid
          mamba install -c conda-forge \
            ghp-import \
            rdkit \
            numpy \
            scipy \
            pandas \
            matplotlib \
            seaborn \
            py3dmol \
            nglview

      - name: Verify installation
        run: |
          which jupyter-book
          jupyter-book --version

      - name: Show project files
        run: |
          pwd
          ls -la
          echo "Checking for key files..."
          ls -la _config.yml _toc.yml references.bib || echo "Some files are missing"

      - name: Build book
        run: |
          echo "Starting Jupyter Book build..."
          jupyter-book build . -W --keep-going

      - name: Inspect build output
        run: |
          echo "Checking _build contents..."
          if [ -d "_build/html" ]; then
            echo "✓ _build/html directory found"
            ls -la _build/html | head -20
            if [ -f "_build/html/index.html" ]; then
              echo "✓ index.html found"
            else
              echo "✗ index.html not found"
              find _build -name "*.html" | head -5
            fi
          else
            echo "✗ _build/html directory not found"
            ls -la _build 2>/dev/null || echo "No _build directory"
            exit 1
          fi

      - name: Deploy to gh-pages
        run: |
          echo "Starting deployment to GitHub Pages..."
          if [ -d "_build/html" ]; then
            echo "✓ _build/html directory exists"
            ls -la _build/html | head -10
            echo "Deploying with ghp-import..."
            ghp-import -n -p -f _build/html
            echo "✓ Deployment completed successfully"
          else
            echo "✗ _build/html directory not found!"
            exit 1
          fi

